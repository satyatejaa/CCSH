{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>Set Your Availability</h4>
                </div>
                <div class="card-body">
                    <form method="post" id="availabilityForm">
                        {% csrf_token %}

                        <div id="availabilitySlots">
                            {% for availability in availabilities %}
                                <div class="row mb-3 availability-row">
                                    <div class="col-md-4">
                                        <select name="days[]" class="form-select" required>
                                            <option value="">Select Day</option>
                                            <option value="0" {% if availability.day == 0 %}selected{% endif %}>Monday</option>
                                            <option value="1" {% if availability.day == 1 %}selected{% endif %}>Tuesday</option>
                                            <option value="2" {% if availability.day == 2 %}selected{% endif %}>Wednesday</option>
                                            <option value="3" {% if availability.day == 3 %}selected{% endif %}>Thursday</option>
                                            <option value="4" {% if availability.day == 4 %}selected{% endif %}>Friday</option>
                                            <option value="5" {% if availability.day == 5 %}selected{% endif %}>Saturday</option>
                                            <option value="6" {% if availability.day == 6 %}selected{% endif %}>Sunday</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="time" name="start_time[]" class="form-control"
                                               value="{{ availability.start_time|time:'H:i' }}" required>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="time" name="end_time[]" class="form-control"
                                               value="{{ availability.end_time|time:'H:i' }}" required>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn btn-danger remove-slot">Remove</button>
                                    </div>
                                </div>
                            {% empty %}
                                <div class="row mb-3 availability-row">
                                    <div class="col-md-4">
                                        <select name="days[]" class="form-select" required>
                                            <option value="">Select Day</option>
                                            <option value="0">Monday</option>
                                            <option value="1">Tuesday</option>
                                            <option value="2">Wednesday</option>
                                            <option value="3">Thursday</option>
                                            <option value="4">Friday</option>
                                            <option value="5">Saturday</option>
                                            <option value="6">Sunday</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="time" name="start_time[]" class="form-control" required>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="time" name="end_time[]" class="form-control" required>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn btn-danger remove-slot">Remove</button>
                                    </div>
                                </div>
                            {% endfor %}
                        </div>

                        <button type="button" class="btn btn-success mb-3" id="addSlot">
                            <i class="bi bi-plus-circle"></i> Add Time Slot
                        </button>

                        <hr>

                        <button type="submit" class="btn btn-primary">Save Availability</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('addSlot').addEventListener('click', function() {
    const slotHtml = `
        <div class="row mb-3 availability-row">
            <div class="col-md-4">
                <select name="days[]" class="form-select" required>
                    <option value="">Select Day</option>
                    <option value="0">Monday</option>
                    <option value="1">Tuesday</option>
                    <option value="2">Wednesday</option>
                    <option value="3">Thursday</option>
                    <option value="4">Friday</option>
                    <option value="5">Saturday</option>
                    <option value="6">Sunday</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="time" name="start_time[]" class="form-control" required>
            </div>
            <div class="col-md-3">
                <input type="time" name="end_time[]" class="form-control" required>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-danger remove-slot">Remove</button>
            </div>
        </div>
    `;
    document.getElementById('availabilitySlots').insertAdjacentHTML('beforeend', slotHtml);
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-slot')) {
        e.target.closest('.availability-row').remove();
    }
});
</script>
{% endblock %}
